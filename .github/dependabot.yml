version: 2

# The workflows pin their actions to a commit SHA rather than a tag, because a tag is
# mutable and one of those jobs holds id-token: write and can publish to npm. A pin with
# nothing to refresh it is just an action that never gets its security fixes, so the two
# belong together: this opens the PR that moves the SHA, with the version in the comment.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ['*']

  # Split by dependency-type, not into one bucket. string-width is a *runtime* dependency
  # — esbuild inlines it into the renderer users actually run — so a bump to it changes the
  # shipped artifact and the layout engine's width maths. Grouped with the tooling, that
  # arrives in a PR titled "bump the dev group", which is how a change to what users run
  # gets waved through as housekeeping. It now says which one it is.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      runtime:
        dependency-type: production
        patterns: ['*']
      tooling:
        dependency-type: development
        patterns: ['*']
